version: '3.7'

services:
  db:
    container_name: db
    image: mysql/mysql-server:8.0.26
    command: --default-authentication-plugin=mysql_native_password --innodb_use_native_aio=0
    expose:
      - 3306
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Saev
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql-saev:/var/lib/mysql

networks:
  default:
    driver: bridge

volumes:
  mysql-saev: